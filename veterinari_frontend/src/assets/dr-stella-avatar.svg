<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="#e0f2f1" stroke="#226B7C" stroke-width="3"/>

  <!-- Neck -->
  <rect x="80" y="140" width="40" height="20" rx="4" fill="#d4a574"/>

  <!-- Lab coat / vet coat body -->
  <path d="M55 155 Q55 148 65 145 L80 140 L120 140 L135 145 Q145 148 145 155 L148 200 L52 200 Z" fill="white" stroke="#ccc" stroke-width="1"/>
  <!-- Coat lapels -->
  <path d="M80 140 L95 170 L100 155" fill="#f0f0f0" stroke="#ddd" stroke-width="0.5"/>
  <path d="M120 140 L105 170 L100 155" fill="#f0f0f0" stroke="#ddd" stroke-width="0.5"/>
  <!-- Scrubs underneath -->
  <path d="M85 155 L95 170 L105 170 L115 155" fill="#226B7C"/>

  <!-- Stethoscope -->
  <path d="M75 160 Q65 170 68 185" fill="none" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="68" cy="188" r="5" fill="#555" stroke="#333" stroke-width="1"/>
  <circle cx="68" cy="188" r="2.5" fill="#888"/>
  <path d="M82 155 Q78 158 75 160" fill="none" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="100" cy="105" rx="38" ry="42" fill="#d4a574"/>

  <!-- Hair - dark wavy pirate style -->
  <path d="M62 95 Q60 70 75 58 Q85 50 100 48 Q115 50 125 58 Q140 70 138 95 Q135 85 125 80 Q110 75 100 76 Q90 75 75 80 Q65 85 62 95 Z" fill="#2c1810"/>
  <!-- Hair sides flowing -->
  <path d="M62 95 Q58 105 60 118 Q62 112 65 105 Q63 100 62 95" fill="#2c1810"/>
  <path d="M138 95 Q142 105 140 118 Q138 112 135 105 Q137 100 138 95" fill="#2c1810"/>
  <!-- Hair top volume -->
  <path d="M70 65 Q80 45 100 43 Q120 45 130 65 Q125 52 100 50 Q75 52 70 65" fill="#3d2317"/>

  <!-- Eyebrows -->
  <path d="M78 92 Q85 88 92 91" fill="none" stroke="#2c1810" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M108 91 Q115 88 122 92" fill="none" stroke="#2c1810" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="85" cy="100" rx="7" ry="6" fill="white"/>
  <ellipse cx="115" cy="100" rx="7" ry="6" fill="white"/>
  <circle cx="86" cy="100" r="3.5" fill="#3d6b4f"/>
  <circle cx="116" cy="100" r="3.5" fill="#3d6b4f"/>
  <circle cx="87" cy="99" r="1.5" fill="white"/>
  <circle cx="117" cy="99" r="1.5" fill="white"/>

  <!-- Nose -->
  <path d="M97 105 Q100 112 103 105" fill="none" stroke="#b8856e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Beard -->
  <path d="M72 118 Q72 125 78 132 Q85 140 100 143 Q115 140 122 132 Q128 125 128 118 Q125 120 120 118 Q115 122 110 120 Q105 123 100 122 Q95 123 90 120 Q85 122 80 118 Q75 120 72 118" fill="#2c1810"/>
  <!-- Mustache -->
  <path d="M82 118 Q90 115 100 120 Q110 115 118 118 Q110 120 100 117 Q90 120 82 118" fill="#3d2317"/>

  <!-- Smile under mustache (hidden by beard, subtle) -->
  <path d="M88 122 Q100 128 112 122" fill="none" stroke="#b8856e" stroke-width="1" opacity="0.3"/>

  <!-- Earring - left ear - gold hoop pirate style -->
  <circle cx="62" cy="108" r="5" fill="none" stroke="#DAA520" stroke-width="2.5"/>
  <circle cx="62" cy="113" r="1.5" fill="#FFD700"/>

  <!-- Ears -->
  <ellipse cx="62" cy="102" rx="5" ry="8" fill="#d4a574"/>
  <ellipse cx="138" cy="102" rx="5" ry="8" fill="#d4a574"/>

  <!-- Vet cross badge on coat -->
  <circle cx="130" cy="165" r="8" fill="#226B7C"/>
  <rect x="127" y="160" width="6" height="10" rx="1" fill="white"/>
  <rect x="125" y="162.5" width="10" height="5" rx="1" fill="white"/>

  <!-- Paw print on badge -->
  <g transform="translate(70,162) scale(0.35)">
    <circle cx="10" cy="15" r="5" fill="#226B7C"/>
    <circle cx="22" cy="10" r="4" fill="#226B7C"/>
    <circle cx="34" cy="10" r="4" fill="#226B7C"/>
    <circle cx="44" cy="15" r="5" fill="#226B7C"/>
    <ellipse cx="27" cy="28" rx="12" ry="9" fill="#226B7C"/>
  </g>
</svg>
