server {
    listen 80;
    server_name veterinariovicino.it www.veterinariovicino.it;
    root /var/www/veterinari/frontend/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp|avif|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
