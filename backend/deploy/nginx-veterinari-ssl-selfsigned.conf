# HTTPS temporaneo (cert self-signed) — sostituire con Let's Encrypt quando il challenge HTTP funziona dall'esterno
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name veterinariovicino.it www.veterinariovicino.it;
    ssl_certificate /etc/ssl/certs/veterinari-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/veterinari-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    root /var/www/veterinari/frontend/dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp|avif|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.veterinariovicino.it;
    ssl_certificate /etc/ssl/certs/veterinari-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/veterinari-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    location / {
        proxy_pass http://127.0.0.1:8060;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
